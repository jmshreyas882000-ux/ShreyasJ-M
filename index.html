<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEURAL_ARCHIVE_2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-first">
  <!-- WebGPU background layer -->
  <canvas id="bg"></canvas>

  <main class="bento-grid">
    <!-- Header with 1px border precision -->
    <header class="card span-full">
      <h1 class="kinetic-text">AGENTIC_SYSTEMS</h1>
      <nav>
        <button class="pill-cta">VIEW_TERMINAL</button>
      </nav>
    </header>

    <!-- Project Card: Explicitly defined for AI visibility -->
    <section class="card tall" id="projects">
      <span class="label">PROJECT_01</span>
      <h2>Neural Shaders</h2>
      <p>Simulating biological noise at 120FPS using TSL.</p>
    </section>

    <!-- Interactive Bento Block -->
    <section class="card wide" id="stack">
      <span class="label">CORE_STACK</span>
      <div class="stack-icons">
        <!-- SVG icons for performance -->
        <span>WebGPU</span> <span>TSL</span> <span>Next.js</span>
      </div>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
